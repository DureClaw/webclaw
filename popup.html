<!doctype html>
<html><head><meta charset="utf-8"><title>webclaw</title>
<style>
  body { width: 320px; margin: 0; font: 12px -apple-system, sans-serif; color: #0f172a; }
  header { background: #0b1220; color: #fff; padding: 10px 12px; display: flex; align-items: center; gap: 8px; }
  header b { font-size: 14px; } header b span { color: #34d399; }
  .dot { width: 9px; height: 9px; border-radius: 50%; background: #64748b; }
  .dot.on { background: #34d399; } .dot.off { background: #e11d48; }
  .body { padding: 12px; }
  label { display: block; font-size: 10px; color: #64748b; margin: 7px 0 2px; }
  input { width: 100%; box-sizing: border-box; padding: 5px 7px; border: 1px solid #cbd5e1; border-radius: 6px; font: 11px monospace; }
  button { margin-top: 10px; width: 100%; padding: 7px; border: 0; border-radius: 7px; background: #4f46e5; color: #fff; font-weight: 700; cursor: pointer; }
  .feed { margin-top: 10px; max-height: 160px; overflow: auto; background: #0b1220; border-radius: 7px; padding: 6px; font: 10px monospace; color: #cdd9e5; }
  .feed .in { color: #818cf8; } .feed .out { color: #34d399; }
  .muted { color: #94a3b8; font-size: 10px; }
</style></head>
<body>
  <header>
    <span class="dot" id="dot"></span>
    <b>web<span>claw</span></b>
    <span class="muted" id="status" style="margin-left:auto">—</span>
  </header>
  <div class="body">
    <label>Bus (host:port)</label><input id="bus" placeholder="100.108.196.12:4000">
    <label>Token (OAH_SECRET)</label><input id="secret" type="password">
    <label>Work Key</label><input id="workKey" placeholder="WK-...">
    <label>Agent name</label><input id="name" placeholder="webclaw@browser">
    <label>Brain URL (master, keyless LLM)</label><input id="brainUrl" placeholder="http://100.108.196.12:4111">
    <label>Brain token</label><input id="brainToken" type="password">
    <button id="connect">Connect to fleet</button>
    <div class="muted" style="margin-top:6px">통신·대화 피드</div>
    <div class="feed" id="feed"></div>
  </div>
  <script src="popup.js"></script>
</body></html>
